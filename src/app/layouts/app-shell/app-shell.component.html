<div class="app-shell">
  <app-sidebar [navigation]="navigation" />

  <div class="workspace">
    <header class="mobile-topbar">
      <div class="mobile-profile">
        <div class="mobile-avatar" role="img" aria-label="Administrator Profile">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <h1>Architectural Curator</h1>
      </div>
      <button class="icon-btn mobile-notify" type="button" aria-label="Notifications">
        <span class="material-symbols-outlined">notifications</span>
      </button>
    </header>

    <header class="topbar">
      <div class="topbar-left">
        <div class="search-box">
          <span class="material-symbols-outlined search-icon">search</span>
          <input class="search-input" type="text" placeholder="Search insights..." />
        </div>
        <nav class="top-tabs" aria-label="Section navigation">
          <a
            class="top-tab"
            routerLink="/dashboard"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >Overview</a>
          <a class="top-tab" href="#">Reports</a>
          <a class="top-tab" href="#">Settings</a>
        </nav>
      </div>
      <div class="topbar-right">
        <button class="icon-btn notification-btn" type="button" aria-label="Notifications">
          <span class="material-symbols-outlined">notifications</span>
          <span class="notification-dot"></span>
        </button>
        <button class="icon-btn" type="button" aria-label="Help">
          <span class="material-symbols-outlined">help_outline</span>
        </button>
        <div class="topbar-divider"></div>
        <div class="profile-avatar" role="img" aria-label="Administrator Profile">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
      </div>
    </header>

    <main class="workspace-content">
      <router-outlet />
    </main>

    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
      <a
        class="mobile-nav-item"
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </a>
      <a class="mobile-nav-item" href="#">
        <span class="material-symbols-outlined">inventory_2</span>
        <span>Inventory</span>
      </a>
      <a class="mobile-nav-item" href="#">
        <span class="material-symbols-outlined">payments</span>
        <span>Sales</span>
      </a>
      <a class="mobile-nav-item" href="#">
        <span class="material-symbols-outlined">group</span>
        <span>Users</span>
      </a>
    </nav>
  </div>
</div>
