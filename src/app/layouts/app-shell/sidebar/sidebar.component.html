<aside class="sidebar">
  <div class="brand">
    <h1>Curator ERP</h1>
    <p class="brand-sub">Enterprise Resource Planning</p>
  </div>

  <nav class="navigation" aria-label="Primary">
    @for (item of navigation(); track item.label) {
      <a
        class="nav-link"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
      >
        <span class="material-symbols-outlined nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-bottom">
    <button class="new-transaction-btn" type="button">
      <span class="material-symbols-outlined">add</span>
      New Transaction
    </button>
    <div class="org-meta">
      <div class="org-logo-icon">
        <span class="material-symbols-outlined">corporate_fare</span>
      </div>
      <div>
        <p class="org-name">Architectural Curator</p>
        <p class="org-sub">Global HQ</p>
      </div>
    </div>
  </div>
</aside>
